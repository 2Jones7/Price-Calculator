<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Price Calculator</title>
</head>
<body>

<div style="padding: 30px; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; text-align: center; width: 95%; max-width: 450px; margin: 40px auto; border-radius: 25px; background: linear-gradient(145deg, #2c3e50, #1a252f); box-shadow: 10px 10px 20px #0b1117, -2px -2px 5px #45627e; color: #ffffff; box-sizing: border-box; border: 1px solid #3e5871;">
  <link href="https://fonts.googleapis.com/css2?family=Style+Script&display=swap" rel="stylesheet">
  
  <div style="width: 100%; margin: 0 auto; display: flex; flex-direction: column; align-items: center; justify-content: center;">
    <h2 id="dynamicHeader" style="font-family: 'Style Script', cursive; margin: 0; color: #f1c40f; width: 100%; text-align: center; white-space: nowrap; text-shadow: 2px 2px 0px rgba(0,0,0,0.5), -1px -1px 0px rgba(255,255,255,0.1); line-height: 1;">Graphic Impressions</h2>
    
    <div style="height: 1px; background: linear-gradient(90deg, transparent, #f1c40f, transparent); width: 100%; margin: 10px 0;"></div>
    
    <h4 style="margin: 0 0 30px 0; color: #bdc3c7; font-weight: 300; font-size: 14px; letter-spacing: 4px; text-transform: uppercase;">Price Calculator</h4>
  </div>
  
  <div style="text-align: left; margin: 0 auto; width: 100%; max-width: 350px;">
    <div style="margin-bottom: 20px;">
      <label style="display: block; font-weight: 600; margin-bottom: 8px; font-size: 15px; color: #ecf0f1;">Garment Cost Price</label>
      <div style="position: relative; display: flex; align-items: center;">
        <span style="position: absolute; left: 15px; font-size: 16px; color: #2c3e50; font-weight: bold;">£</span>
        <input type="number" id="A2" step="0.01" onblur="this.value=parseFloat(this.value||0).toFixed(2)" style="width:100%; padding: 14px 14px 14px 35px; font-size: 16px; border: none; border-radius: 12px; background-color: #ffffff; color: #2c3e50; outline: none; box-shadow: inset 3px 3px 6px #b8b8b8; box-sizing: border-box;">
      </div>
    </div>
    
    <div style="margin-bottom: 20px;">
      <label style="display: block; font-weight: 600; margin-bottom: 8px; font-size: 15px; color: #ecf0f1;">Markup %</label>
      <input type="number" id="B2" value="40" style="width:100%; padding: 14px; font-size: 16px; border: none; border-radius: 12px; background-color: #ffffff; color: #2c3e50; outline: none; box-shadow: inset 3px 3px 6px #b8b8b8; box-sizing: border-box;">
    </div>
    
    <div style="margin-bottom: 30px;">
      <label style="display: block; font-weight: 600; margin-bottom: 8px; font-size: 15px; color: #ecf0f1;">Decoration Amount (Inc VAT)</label>
      <div style="position: relative; display: flex; align-items: center;">
        <span style="position: absolute; left: 15px; font-size: 16px; color: #2c3e50; font-weight: bold;">£</span>
        <input type="number" id="I2" step="0.01" onblur="this.value=parseFloat(this.value||0).toFixed(2)" style="width:100%; padding: 14px 14px 14px 35px; font-size: 16px; border: none; border-radius: 12px; background-color: #ffffff; color: #2c3e50; outline: none; box-shadow: inset 3px 3px 6px #b8b8b8; box-sizing: border-box;">
      </div>
    </div>
    
    <button onclick="calculate()" style="width:100%; padding: 16px; background: linear-gradient(90deg, #f39c12, #e67e22); color: white; border: none; font-weight: 800; border-radius: 12px; cursor: pointer; font-size: 18px; transition: transform 0.2s, box-shadow 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.3);">Calculate Price</button>
    
    <div id="resultsBox" style="margin-top: 30px; padding: 20px; background-color: #1a252f; border-radius: 15px; border: 1px solid #3e5871; box-sizing: border-box; display: flex; flex-direction: column; align-items: center;">
      <h3 id="resultJ2" style="margin: 0; color: #bdc3c7; font-size: 15px; font-weight: normal; white-space: nowrap;">Final Price (Before VAT): £0.00</h3>
      <h3 id="resultK2" style="margin: 0; color: #f1c40f; font-size: 24px; font-weight: 800; white-space: nowrap;">Final Price (Inc VAT): £0.00</h3>
    </div>
  </div>
</div>

<script>
function fitText() {
  const header = document.getElementById('dynamicHeader');
  const container = header.parentElement;
  let newSize = container.clientWidth * 0.15;
  if (newSize > 50) newSize = 50;
  if (newSize < 20) newSize = 20;
  header.style.fontSize = newSize + "px";
}

window.onload = fitText;
window.onresize = fitText;

function calculate() {
  let A2 = parseFloat(document.getElementById('A2').value) || 0;
  let B2 = parseFloat(document.getElementById('B2').value) || 0;
  let I2_incVAT = parseFloat(document.getElementById('I2').value) || 0;

  let I2 = I2_incVAT / 1.20;
  let C2 = A2 * (B2 / 100);
  let D2 = (C2 > 1.5) ? C2 : 1.5;
  let E2 = D2 + A2;
  let F2 = Math.round(E2 / 0.25) * 0.25; 
  let G2 = F2;
  
  let J2 = I2 + G2;
  let K2 = (J2 * 0.20) + J2;

  let resJ = document.getElementById('resultJ2');
  let resK = document.getElementById('resultK2');

  resJ.innerText = 'Final Price (Before VAT): £' + J2.toFixed(2);
  resK.innerText = 'Final Price (Inc VAT): £' + K2.toFixed(2);

  resJ.style.fontSize = "20px";
  resK.style.fontSize = "22px";

  while (resJ.scrollWidth > 310 && parseInt(resJ.style.fontSize) > 10) {
    resJ.style.fontSize = (parseInt(resJ.style.fontSize) - 1) + "px";
  }
  while (resK.scrollWidth > 310 && parseInt(resK.style.fontSize) > 10) {
    resK.style.fontSize = (parseInt(resK.style.fontSize) - 1) + "px";
  }
}
</script>
</body>
</html>
